<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PMP Certification Progress Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>PMP Certification Progress Tracker</h1>
        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        <p id="progressText">0% Complete</p>

        <div id="pmp-topics">
            <h2>I. People (42%)</h2>
            <ul class="task-list">
                <li><input type="checkbox" id="task1.1"> <label for="task1.1">Manage conflict</label></li>
                <li><input type="checkbox" id="task1.2"> <label for="task1.2">Lead a team</label></li>
                <li><input type="checkbox" id="task1.3"> <label for="task1.3">Support team performance</label></li>
                <li><input type="checkbox" id="task1.4"> <label for="task1.4">Empower team members and stakeholders</label></li>
                <li><input type="checkbox" id="task1.5"> <label for="task1.5">Ensure team members/stakeholders are adequately trained</label></li>
                <li><input type="checkbox" id="task1.6"> <label for="task1.6">Build a team</label></li>
                <li><input type="checkbox" id="task1.7"> <label for="task1.7">Address and remove impediments, obstacles, and blockers for the team</label></li>
                <li><input type="checkbox" id="task1.8"> <label for="task1.8">Negotiate project agreements</label></li>
                <li><input type="checkbox" id="task1.9"> <label for="task1.9">Collaborate with stakeholders</label></li>
                <li><input type="checkbox" id="task1.10"> <label for="task1.10">Build shared understanding</label></li>
                <li><input type="checkbox" id="task1.11"> <label for="task1.11">Engage and support virtual teams</label></li>
                <li><input type="checkbox" id="task1.12"> <label for="task1.12">Define team ground rules</label></li>
                <li><input type="checkbox" id="task1.13"> <label for="task1.13">Mentor relevant stakeholders</label></li>
                <li><input type="checkbox" id="task1.14"> <label for="task1.14">Promote team performance through the application of emotional intelligence</label></li>
            </ul>

            <h2>II. Process (50%)</h2>
            <ul class="task-list">
                <li><input type="checkbox" id="task2.1"> <label for="task2.1">Execute project with the urgency required to deliver business value</label></li>
                <li><input type="checkbox" id="task2.2"> <label for="task2.2">Manage communications</label></li>
                <li><input type="checkbox" id="task2.3"> <label for="task2.3">Assess and manage risks</label></li>
                <li><input type="checkbox" id="task2.4"> <label for="task2.4">Engage stakeholders</label></li>
                <li><input type="checkbox" id="task2.5"> <label for="task2.5">Plan and manage budget and resources</label></li>
                <li><input type="checkbox" id="task2.6"> <label for="task2.6">Plan and manage schedule</label></li>
                <li><input type="checkbox" id="task2.7"> <label for="task2.7">Plan and manage quality of products/deliverables</label></li>
                <li><input type="checkbox" id="task2.8"> <label for="task2.8">Plan and manage scope</label></li>
                <li><input type="checkbox" id="task2.9"> <label for="task2.9">Integrate project planning activities</label></li>
                <li><input type="checkbox" id="task2.10"> <label for="task2.10">Manage project changes</label></li>
                <li><input type="checkbox" id="task2.11"> <label for="task2.11">Plan and manage procurement</label></li>
                <li><input type="checkbox" id="task2.12"> <label for="task2.12">Manage project artifacts</label></li>
                <li><input type="checkbox" id="task2.13"> <label for="task2.13">Determine appropriate project methodology/methods and practices</label></li>
                <li><input type="checkbox" id="task2.14"> <label for="task2.14">Establish project governance structure</label></li>
                <li><input type="checkbox" id="task2.15"> <label for="task2.15">Manage project issues</label></li>
                <li><input type="checkbox" id="task2.16"> <label for="task2.16">Ensure knowledge transfer for project continuity</label></li>
                <li><input type="checkbox" id="task2.17"> <label for="task2.17">Plan and manage project/phase closure or transitions</label></li>
            </ul>

            <h2>III. Business Environment (8%)</h2>
            <ul class="task-list">
                <li><input type="checkbox" id="task3.1"> <label for="task3.1">Plan and manage project compliance</label></li>
                <li><input type="checkbox" id="task3.2"> <label for="task3.2">Evaluate and deliver project benefits and value</label></li>
                <li><input type="checkbox" id="task3.3"> <label for="task3.3">Evaluate and address external business environment changes for impact on scope</label></li>
                <li><input type="checkbox" id="task3.4"> <label for="task3.4">Support organizational change</label></li>
            </ul>
        </div>
        <button id="resetButton">Reset Progress</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
